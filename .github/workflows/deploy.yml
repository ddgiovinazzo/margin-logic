# ============================================================================
# GITHUB ACTIONS SECURITY & MAINTENANCE INSTRUCTIONS FOR AI AGENTS:
# 1. ACTION PINNING: Pin all external actions to a full 40-character commit SHA
#    (never use mutable tags like @v4 or @main directly).
# 2. VERSION COMMENTS: Always append the version tag as a trailing comment
#    on the same line (e.g., uses: actions/checkout@<SHA> # v4.2.2).
#    This allows Dependabot to track versions and auto-update the SHAs.
# 3. NO DUMMY SHAS: Ensure every SHA is a valid, existing commit hash in that
#    action's repository. Do not guess, truncate, or mix parts of different SHAs.
# 4. VS CODE FALSE-POSITIVES: Local IDE diagnostics stating "Unable to resolve
#    action... repository or version not found" are false-positives when using
#    valid commit SHAs. Do NOT revert back to version tags to fix these editor warnings.
# ============================================================================

name: CI/CD Pipeline - Verify & Deploy

on:
    pull_request:
        branches: ["main"]
    push:
        branches: ["main"]
    workflow_dispatch:

concurrency:
    group: production-deployments
    cancel-in-progress: false # 👈 Forces an orderly queue

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    verify-global:
        name: Global Formatting & Linting
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install root dependencies
              run: npm ci

            - name: Verify GitHub Action SHAs are pinned
              run: |
                  npm run pin-actions
                  git diff --exit-code .github/workflows/

            - name: Check Formatting
              run: npm run format:check

            - name: Run Linter
              run: npm run lint

            - name: Audit Workspace Dependencies
              run: npm audit --audit-level=high --workspaces

    verify-backend:
        name: Backend Compilation & Tests
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Typecheck Backend
              run: npx tsc --build
              working-directory: ./backend

            - name: Run Backend Tests
              run: npm test --prefix backend

    verify-frontend:
        name: Frontend Compilation & Tests
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Typecheck Frontend
              run: npx tsc --build
              working-directory: ./frontend

            - name: Run Frontend Tests
              run: npm test --prefix frontend

    security-scan:
        name: Secret Security Scanning
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: GitLeaks Scan
              uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    verify:
        name: Code Verification & Testing
        runs-on: ubuntu-latest
        needs: [verify-global, verify-backend, verify-frontend, security-scan]
        steps:
            - name: Verification Success
              run: echo "All verification checks passed!"

    deploy:
        name: Build & Deploy to Production
        runs-on: ubuntu-latest
        needs: [verify-global, verify-backend, verify-frontend, security-scan]
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        environment: prod
        permissions:
            contents: read
            pages: write
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            # --- Backend Deployment (AWS SAM) ---#
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
              with:
                  role-to-assume: ${{ secrets.AWS_ARN }}
                  aws-region: us-east-1

            - name: Set up AWS SAM CLI
              uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
              with:
                  use-installer: true

            - name: Install Global Compilers
              run: npm install -g esbuild typescript

            - name: SAM Deploy
              run: npm run deploy
              working-directory: ./backend
              env:
                  EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
                  EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
                  EBAY_DEV_ID: ${{ secrets.EBAY_DEV_ID }}

            - name: Get API Gateway Base URL
              id: get-api-url
              run: |
                  API_URL=$(aws cloudformation describe-stacks --stack-name margin-logic-prod --query "Stacks[0].Outputs[?OutputKey=='WebEndpoint'].OutputValue" --output text)
                  echo "VITE_API_URL=${API_URL}" > frontend/.env

            # --- Frontend Deployment (GitHub Pages) ---
            - name: Build Frontend
              run: npm run build
              working-directory: ./frontend

            - name: Setup Pages
              uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

            - name: Upload artifact
              uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
              with:
                  path: "./frontend/dist"

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
