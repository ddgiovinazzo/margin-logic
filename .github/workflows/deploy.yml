name: CI/CD Pipeline - Verify & Deploy

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["main"]
    workflow_dispatch:

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    verify:
        name: Code Verification & Testing
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v4.2.2

            - name: Set up Node.js
              uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install root dependencies
              run: npm ci

            - name: Install backend dependencies
              run: npm ci --prefix backend

            - name: Install frontend dependencies
              run: npm ci --prefix frontend

            - name: Check Formatting
              run: npm run format:check

            - name: Run Linter
              run: npm run lint

            - name: Typecheck & Build Sanity Check
              run: node node_modules/typescript/bin/tsc --build

            - name: Run Backend Tests
              run: npm test

    security-scan:
        name: Secret Security Scanning
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v4.2.2
              with:
                  fetch-depth: 0

            - name: GitLeaks Scan
              uses: gitleaks/gitleaks-action@f586c14336262529367858c49cc8b7f8f05e328e # v2.3.8
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    deploy:
        name: Build & Deploy to Production
        runs-on: ubuntu-latest
        needs: [verify, security-scan]
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        permissions:
            contents: read
            pages: write
            id-token: write
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - name: Checkout
              uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v4.2.2

            # --- Backend Deployment (AWS SAM) ---
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e03a3d0b # v4.0.2
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: us-east-1

            - name: Set up AWS SAM CLI
              uses: aws-actions/setup-sam@89ddb14d241773c21c7b80a6b5774a3f12443657 # v3.0.0
              with:
                  use-installer: true

            - name: Install Global Compilers
              run: npm install -g esbuild typescript

            - name: Install backend dependencies
              run: npm ci
              working-directory: ./backend

            - name: SAM Build
              run: sam build
              working-directory: ./backend

            - name: SAM Deploy
              run: sam deploy --stack-name margin-logic-backend --resolve-s3 --capabilities CAPABILITY_IAM --no-confirm-changeset --no-fail-on-empty-changeset
              working-directory: ./backend

            - name: Get API Gateway Base URL
              id: get-api-url
              run: |
                  API_ID=$(aws apigateway get-rest-apis --query "items[?name=='margin-logic-backend'].id" --output text)
                  echo "VITE_API_URL=https://${API_ID}.execute-api.us-east-1.amazonaws.com/Prod" >> $GITHUB_ENV

            # --- Frontend Deployment (GitHub Pages) ---
            - name: Set up Node.js
              uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
              with:
                  node-version: 20
                  cache: "npm"
                  cache-dependency-path: "./frontend/package-lock.json"

            - name: Install frontend dependencies
              run: npm ci
              working-directory: ./frontend

            - name: Build Frontend
              run: npm run build
              working-directory: ./frontend
              env:
                  VITE_API_URL: ${{ env.VITE_API_URL }}

            - name: Setup Pages
              uses: actions/configure-pages@983d77366d740c061614777c5952f4a470123516 # v5.0.0

            - name: Upload artifact
              uses: actions/upload-pages-artifact@05a6b0c26571597f7614e5a9735d4755d5b780b1 # v3.0.1
              with:
                  path: "./frontend/dist"

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@d6db9011e03259e8633c37346ef27976e5d22d36 # v4.0.5
