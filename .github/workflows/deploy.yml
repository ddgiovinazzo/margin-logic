name: CI/CD Pipeline - Verify & Deploy

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    verify:
        name: Code Verification & Testing
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install root dependencies
              run: npm ci

            - name: Install backend dependencies
              run: npm ci --prefix backend

            - name: Install frontend dependencies
              run: npm ci --prefix frontend

            - name: Check Formatting
              run: npm run format:check

            - name: Run Linter
              run: npm run lint

            - name: Typecheck & Build Sanity Check
              run: node node_modules/typescript/bin/tsc --build

            - name: Run Backend Tests
              run: npm test

    security-scan:
        name: Secret Security Scanning
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: GitLeaks Scan
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    deploy:
        name: Build & Deploy to Production
        runs-on: ubuntu-latest
        needs: [verify, security-scan]
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            # --- Backend Deployment (AWS SAM) ---
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: us-east-1

            - name: Set up AWS SAM CLI
              uses: aws-actions/setup-sam@v2
              with:
                  use-installer: true

            - name: Install Global Compilers
              run: npm install -g esbuild typescript

            - name: Install backend dependencies
              run: npm ci
              working-directory: ./backend

            - name: SAM Build
              run: sam build
              working-directory: ./backend

            - name: SAM Deploy
              run: sam deploy --stack-name margin-logic-backend --resolve-s3 --capabilities CAPABILITY_IAM --no-confirm-changeset --no-fail-on-empty-changeset
              working-directory: ./backend

            - name: Get API Gateway Base URL
              id: get-api-url
              run: |
                  API_ID=$(aws apigateway get-rest-apis --query "items[?name=='margin-logic-backend'].id" --output text)
                  echo "VITE_API_URL=https://${API_ID}.execute-api.us-east-1.amazonaws.com/Prod" >> $GITHUB_ENV

            # --- Frontend Deployment (GitHub Pages) ---
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
                  cache-dependency-path: "./frontend/package-lock.json"

            - name: Install frontend dependencies
              run: npm ci
              working-directory: ./frontend

            - name: Build Frontend
              run: npm run build
              working-directory: ./frontend
              env:
                  VITE_API_URL: ${{ env.VITE_API_URL }}

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "./frontend/dist"

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
