name: Deploy MarginLogic to GitHub Pages and AWS Lambda

on:
    push:
        branches: ["main"]

    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            # --- Backend Deployment (AWS SAM) ---
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: us-east-1

            - name: Set up AWS SAM CLI
              uses: aws-actions/setup-sam@v2
              with:
                  use-installer: true

            - name: SAM Build
              run: sam build
              working-directory: ./backend

            - name: SAM Deploy
              run: sam deploy --stack-name margin-logic-backend --resolve-s3 --capabilities CAPABILITY_IAM --no-confirm-changeset --no-fail-on-empty-changeset
              working-directory: ./backend

            - name: Get API Gateway Base URL
              id: get-api-url
              run: |
                  API_ID=$(aws apigateway get-rest-apis --query "items[?name=='margin-logic-backend'].id" --output text)
                  echo "VITE_API_URL=https://${API_ID}.execute-api.us-east-1.amazonaws.com/Prod" >> $GITHUB_ENV

            # --- Frontend Deployment (GitHub Pages) ---
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
                  cache-dependency-path: "./frontend/package-lock.json"

            - name: Install dependencies
              run: npm ci
              working-directory: ./frontend

            - name: Build Frontend
              run: npm run build
              working-directory: ./frontend
              env:
                  VITE_API_URL: ${{ env.VITE_API_URL }}

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "./frontend/dist"

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4