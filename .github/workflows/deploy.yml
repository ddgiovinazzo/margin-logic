name: Deploy MarginLogic to GitHub Pages and AWS Lambda

on:
    push:
        branches: ["main"]

    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            # --- Backend Deployment (AWS SAM) ---
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: us-east-1

            - name: Set up AWS SAM CLI
              uses: aws-actions/setup-sam@f84ec7d548307efafe33230528756de3c5841a17 # v2
              with:
                  use-installer: true

            - name: SAM Build
              run: sam build
              working-directory: ./backend

            - name: SAM Deploy
              run: sam deploy --stack-name margin-logic-backend --resolve-s3 --capabilities CAPABILITY_IAM --no-confirm-changeset --no-fail-on-empty-changeset
              working-directory: ./backend

            - name: Get API Gateway Base URL
              id: get-api-url
              run: |
                  API_ID=$(aws apigateway get-rest-apis --query "items[?name=='margin-logic-backend'].id" --output text)
                  echo "VITE_API_URL=https://${API_ID}.execute-api.us-east-1.amazonaws.com/Prod" >> $GITHUB_ENV

            # --- Frontend Deployment (GitHub Pages) ---
            - name: Set up Node.js
              uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
              with:
                  node-version: 20
                  cache: "npm"
                  cache-dependency-path: "./frontend/package-lock.json"

            - name: Install dependencies
              run: npm ci
              working-directory: ./frontend

            - name: Build Frontend
              run: npm run build
              working-directory: ./frontend
              env:
                  VITE_API_URL: ${{ env.VITE_API_URL }}

            - name: Setup Pages
              uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4.0.0

            - name: Upload artifact
              uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda9c69eff1a # v3.0.1
              with:
                  path: "./frontend/dist"

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
