# ============================================================================
# GITHUB ACTIONS SECURITY & MAINTENANCE INSTRUCTIONS FOR AI AGENTS:
# 1. ACTION PINNING: Pin all external actions to a full 40-character commit SHA
#    (never use mutable tags like @v4 or @main directly).
# 2. VERSION COMMENTS: Always append the version tag as a trailing comment
#    on the same line (e.g., uses: actions/checkout@<SHA> # v4.2.2).
#    This allows Dependabot to track versions and auto-update the SHAs.
# 3. NO DUMMY SHAS: Ensure every SHA is a valid, existing commit hash in that
#    action's repository. Do not guess, truncate, or mix parts of different SHAs.
# 4. VS CODE FALSE-POSITIVES: Local IDE diagnostics stating "Unable to resolve
#    action... repository or version not found" are false-positives when using
#    valid commit SHAs. Do NOT revert back to version tags to fix these editor warnings.
# ============================================================================

name: CI/CD Pipeline - Verify & Deploy

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["main"]
    workflow_dispatch:

concurrency:
    group: "pages"
    cancel-in-progress: true

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    verify:
        name: Code Verification & Testing
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - name: Set up Node.js
              uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install root dependencies
              run: npm ci

            - name: Verify GitHub Action SHAs are pinned
              run: |
                  npm run pin-actions
                  git diff --exit-code .github/workflows/

            - name: Install backend dependencies
              run: npm ci --prefix backend

            - name: Install frontend dependencies
              run: npm ci --prefix frontend

            - name: Check Formatting
              run: npm run format:check

            - name: Run Linter
              run: npm run lint

            - name: Typecheck Backend
              run: npx --prefix backend tsc --build

            - name: Typecheck Frontend
              run: npx --prefix frontend tsc --build

            - name: Run Backend Tests
              run: npm test

    security-scan:
        name: Secret Security Scanning
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
              with:
                  fetch-depth: 0

            - name: GitLeaks Scan
              uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    deploy:
        name: Build & Deploy to Production
        runs-on: ubuntu-latest
        needs: [verify, security-scan]
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        permissions:
            contents: read
            pages: write
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            # --- Backend Deployment (AWS SAM) ---#
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: us-east-1

            - name: Set up AWS SAM CLI
              uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
              with:
                  use-installer: true

            - name: Install Global Compilers
              run: npm install -g esbuild typescript

            - name: Install backend dependencies
              run: npm ci
              working-directory: ./backend

            - name: SAM Build
              run: sam build
              working-directory: ./backend

            - name: SAM Deploy
              run: sam deploy --stack-name margin-logic-backend --resolve-s3 --capabilities CAPABILITY_IAM --no-confirm-changeset --no-fail-on-empty-changeset
              working-directory: ./backend

            - name: Get API Gateway Base URL
              id: get-api-url
              run: |
                  API_ID=$(aws apigateway get-rest-apis --query "items[?name=='margin-logic-backend'].id" --output text)
                  echo "VITE_API_URL=https://${API_ID}.execute-api.us-east-1.amazonaws.com/Prod" >> $GITHUB_ENV

            # --- Frontend Deployment (GitHub Pages) ---
            - name: Set up Node.js
              uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
              with:
                  node-version: 20
                  cache: "npm"
                  cache-dependency-path: "./frontend/package-lock.json"

            - name: Install frontend dependencies
              run: npm ci
              working-directory: ./frontend

            - name: Build Frontend
              run: npm run build
              working-directory: ./frontend
              env:
                  VITE_API_URL: ${{ env.VITE_API_URL }}

            - name: Setup Pages
              uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

            - name: Upload artifact
              uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
              with:
                  path: "./frontend/dist"

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
