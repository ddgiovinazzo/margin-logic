AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: MarginLogic Default Setup

Globals:
    Api:
        Cors:
            AllowMethods: "'GET,POST,OPTIONS'"
            AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
            # Allow API Gateway to approve all preflight OPTIONS handshakes.
            # Security is delegated downstream to the Lambda's data response.
            AllowOrigin: "'*'"

Resources:
    MarginLogicFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: ./
            Handler: src/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    # Comma-separated whitelist for Dynamic Origin Reflection
                    ALLOWED_ORIGIN: "http://localhost:5173,https://ddgiovinazzo.github.io"
            Events:
                Search:
                    Type: Api
                    Properties:
                        Path: /search
                        Method: get
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: "es2020"
                EntryPoints:
                    - src/app.ts