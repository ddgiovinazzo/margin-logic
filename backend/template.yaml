AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: MarginLogic Default Setup

Parameters:
    EbayClientId:
        Type: String
        Description: "eBay Application Client ID"
        Default: ""
    EbayClientSecret:
        Type: String
        Description: "eBay Application Client Secret ID (Cert ID)"
        Default: ""
    EbayAppId:
        Type: String
        Description: "eBay Application ID (App ID)"
        Default: ""
    EbayCertId:
        Type: String
        Description: "eBay Certificate ID (Cert ID / Client Secret)"
        Default: ""
    EbayDevId:
        Type: String
        Description: "eBay Developer ID (Dev ID)"
        Default: ""
    EbayEnvironment:
        Type: String
        Description: "eBay API environment (sandbox or production)"
        Default: "sandbox"
        AllowedValues:
            - sandbox
            - production
    Environment:
        Type: String
        Description: "AWS Deployment Environment Stage (dev or prod)"
        Default: "dev"
        AllowedValues:
            - dev
            - prod

Globals:
    Api:
        Cors:
            AllowMethods: "'GET,POST,OPTIONS'"
            AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
            # Allow API Gateway to approve all preflight OPTIONS handshakes.
            # Security is delegated downstream to the Lambda's data response.
            AllowOrigin: "'*'"

Resources:
    MarginLogicApi:
        Type: AWS::Serverless::Api
        Properties:
            StageName: !Ref Environment

    MarginLogicFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: ./
            Handler: src/app.lambdaHandler
            Runtime: nodejs20.x
            Environment:
                Variables:
                    # Comma-separated whitelist for Dynamic Origin Reflection
                    ALLOWED_ORIGIN: "http://localhost:5173,https://ddgiovinazzo.github.io"
                    EBAY_APP_ID: !Ref EbayAppId
                    EBAY_CERT_ID: !Ref EbayCertId
                    EBAY_DEV_ID: !Ref EbayDevId
                    EBAY_CLIENT_ID: !Ref EbayClientId
                    EBAY_CLIENT_SECRET: !Ref EbayClientSecret
                    EBAY_ENVIRONMENT: !Ref EbayEnvironment
            Events:
                Search:
                    Type: Api
                    Properties:
                        Path: /search
                        Method: get
                        RestApiId: !Ref MarginLogicApi
            AutoPublishAlias: live
            DeploymentPreference:
                Type: Canary10Percent5Minutes
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: "es2020"
                EntryPoints:
                    - src/app.ts
